<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{meta}}
    <script nonce="{{nonce}}">
        window.appSettings = "{{appSettings}}";

        function applyTheme(themeKind) {
            const root = document.documentElement;

            const isDark = themeKind !== 1; // VS Code: 1 = light

            if (isDark) {
                root.style.setProperty("--primary-text-color", "#fff");
                root.style.setProperty("--secondary-text-color", "#222");
                root.style.setProperty("--primary-bg-color", "#1e1e1e");
                root.style.setProperty("--secondary-bg-color", "#252526");
                root.style.setProperty("--tertiary-bg-color", "#333");
            } else {
                root.style.setProperty("--primary-text-color", "#222");
                root.style.setProperty("--secondary-text-color", "#fff");
                root.style.setProperty("--primary-bg-color", "#ffffff");
                root.style.setProperty("--secondary-bg-color", "#f3f3f3");
                root.style.setProperty("--tertiary-bg-color", "#ddd");
            }
        }
        applyTheme(window.appSettings.themeKind);

        window.require = {
            paths: {
                vs: window.appSettings.monacoPath
            }
        };

    </script>


    <link rel="stylesheet" href="{{editor/editor.main.css}}" />
    <link rel="stylesheet" href="{{..app_styles.css}}" />
</head>

<body>
    <div class="blur"></div>
    <div class="dialog alert-d">
        <div>
            <p>test</p>
            <a class="close">x</a>
        </div>
        <div>
            data
        </div>

    </div>
    <header>
        <a href="https://github.com/1-AlenToma/files-assets-linker-editor">Files-Assets-Linker-Editor</a>
        <div>
            <div>
                <button id="btnSaveAll">Save All</button>
            </div>
            <div>
                <label>useOnlineEditor</label>
                <input type="checkbox" id="chkUseOnlineEditor" />

            </div>
            <div>
                <button id="btnBuild">Build</button>
                <span>Shift + Alt + B</span>
            </div>
            <div>
                <button id="btnSave">Save</button>
                <span>Ctrl + S</span>
            </div>
            <div>
                <button id="btnFormat">Format</button>
                <span>Ctrl + Alt + F</span>
            </div>
            <div>
                <button id="btnReload">Reload</button>
                <span>Shift + Alt + R</span>
            </div>
        </div>
    </header>
    <div class="mainItem">
        <div id="sidebar">
            <h3>Assets</h3>
            <div id="list"></div>
        </div>

        <div class="tabs" id="tabs">
            <div class="tab-bar" id="tabBar"></div>
            <div class="tab-panels" id="tabPanels">
            </div>
        </div>
    </div>
    <script nonce="{{nonce}}" src="{{loader.js}}"></script>
    <script nonce="{{nonce}}" src="{{..app_js.js}}"></script>

</body>

</html>
